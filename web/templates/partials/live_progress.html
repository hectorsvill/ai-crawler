<!-- partials/live_progress.html — live stats bar for running sessions -->
{% set s = stats %}
<div class="grid grid-cols-4 gap-3">
  <div class="bg-[#0a0a0f] rounded px-3 py-2 border border-gray-800">
    <p class="text-xs text-gray-600">Pages</p>
    <p class="text-lg font-mono font-semibold text-green-ok" id="live-pages">{{ s.get('pages_crawled', 0) }}</p>
  </div>
  <div class="bg-[#0a0a0f] rounded px-3 py-2 border border-gray-800">
    <p class="text-xs text-gray-600">Failed</p>
    <p class="text-lg font-mono font-semibold text-red-err/70" id="live-failed">{{ s.get('pages_failed', 0) }}</p>
  </div>
  <div class="bg-[#0a0a0f] rounded px-3 py-2 border border-gray-800">
    <p class="text-xs text-gray-600">Extractions</p>
    <p class="text-lg font-mono font-semibold text-cyan-electric" id="live-extr">{{ s.get('extractions', 0) }}</p>
  </div>
  <div class="bg-[#0a0a0f] rounded px-3 py-2 border border-gray-800">
    <p class="text-xs text-gray-600">Queue</p>
    <p class="text-lg font-mono font-semibold text-amber-warn" id="live-queue">{{ s.get('queue_size', 0) }}</p>
  </div>
</div>
{% if s.get('current_url') %}
<p class="text-xs font-mono text-gray-600 mt-2 truncate">
  Current: <span class="text-gray-400">{{ s.current_url }}</span>
</p>
{% endif %}
