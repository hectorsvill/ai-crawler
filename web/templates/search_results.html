{% extends "base.html" %}
{% block title %}Search — AI Crawler{% endblock %}

{% block content %}

<div class="mb-6">
  <h1 class="text-lg font-semibold text-gray-100 mb-4">Search</h1>

  <!-- Search bar -->
  <div class="relative">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input
      type="text"
      name="q"
      id="search-input"
      value="{{ query }}"
      placeholder="Search pages, extractions, session goals…"
      autocomplete="off"
      hx-get="/search/results"
      hx-trigger="keyup changed delay:300ms, search"
      hx-target="#search-results"
      hx-include="this"
      class="w-full pl-10 pr-4 py-3 bg-surface border border-gray-700 rounded-lg text-gray-100
             font-mono text-sm placeholder-gray-600 focus:outline-none focus:border-cyan-electric/50
             transition-colors">
    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-600 font-mono htmx-indicator">
      Searching…
    </span>
  </div>

  <p class="text-xs text-gray-600 mt-2">
    Supports FTS5 syntax — e.g. <code class="font-mono">"exact phrase"</code>,
    <code class="font-mono">term*</code>, <code class="font-mono">AND / OR / NOT</code>
  </p>
</div>

<!-- Results -->
<div id="search-results">
  {% include "partials/search_hit.html" %}
</div>

{% endblock %}
